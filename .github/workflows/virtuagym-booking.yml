name: Virtuagym booking

on:
  schedule:
    # Zomertijd (CEST)
    # - cron: "45-59/5 17 * * 1"
    # - cron: "0-5/5 18 * * 1"

    # Wintertijd (CET)
    - cron: "45-59/5 18 * * 1"
    - cron: "0-5/5 19 * * 1"

  workflow_dispatch:

concurrency:
  group: virtuagym-booking
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Restore storage state
        run: echo "$VG_STORAGE_STATE" | base64 --decode > storageState.json
        env:
          VG_STORAGE_STATE: ${{ secrets.VG_STORAGE_STATE }}

      - name: Run booking bot
        run: node book-virtuagym.js
        env:
          VG_LOGIN_URL: ${{ secrets.VG_LOGIN_URL }}
          VG_WEEK_QUERY: ${{ secrets.VG_WEEK_QUERY }}
          VG_CLASS_NAME: ${{ secrets.VG_CLASS_NAME }}
          VG_CLASS_TIME: ${{ secrets.VG_CLASS_TIME }}
          VG_TEST_MODE: ${{ secrets.VG_TEST_MODE }}
          VG_STORAGE_STATE: ${{ secrets.VG_STORAGE_STATE }}

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"